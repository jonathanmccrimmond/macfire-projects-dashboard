<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacFire Projects Dashboard</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f2eb;
      --panel: #fffdfa;
      --panel-strong: #fff8ef;
      --ink: #1d2228;
      --muted: #5c646f;
      --line: #e6ddd0;
      --accent: #d64c2c;
      --accent-soft: #f8d9cf;
      --ok: #207a41;
      --pilot: #b46c07;
      --planned: #6d7480;
      --shadow: 0 16px 36px rgba(38, 26, 15, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 85% -20%, #ffe4d4 0%, rgba(255, 228, 212, 0.2) 50%, rgba(255, 228, 212, 0) 70%),
        linear-gradient(180deg, #fcf8f3 0%, #f8f2eb 100%);
      font-family: "Manrope", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .identity {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .mark {
      width: 42px;
      height: 42px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1f252c, #485566);
      display: grid;
      place-items: center;
      color: #fff;
      font-size: 22px;
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: clamp(24px, 3.3vw, 44px);
      letter-spacing: 0;
      line-height: 1.05;
    }

    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 14px;
    }

    .quick-links {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .quick-links a {
      text-decoration: none;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      transition: transform 180ms ease, background 180ms ease, border-color 180ms ease;
    }

    .quick-links a:hover {
      transform: translateY(-2px);
      border-color: #d4c1aa;
      background: #fffbf6;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 920px) {
      .stats {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 580px) {
      .stats {
        grid-template-columns: 1fr;
      }
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
      box-shadow: var(--shadow);
      animation: fadeIn 420ms ease both;
    }

    .stat .label {
      margin: 0 0 8px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    .stat .value {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 30px;
      line-height: 1;
    }

    .filters {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filters strong {
      font-size: 13px;
      font-weight: 700;
    }

    .filters button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .filters button:hover {
      transform: translateY(-1px);
      border-color: #d5c4b0;
    }

    .filters button.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }

    .project-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 12px;
      animation: riseIn 520ms ease both;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .project-name {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 24px;
      line-height: 1.05;
    }

    .category {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge.active {
      background: #dff5e8;
      color: var(--ok);
    }

    .badge.pilot {
      background: #fff0d5;
      color: var(--pilot);
    }

    .badge.planned {
      background: #eceff2;
      color: var(--planned);
    }

    .summary,
    .function-line,
    .small-note {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
    }

    .summary {
      font-weight: 700;
    }

    .function-line {
      color: var(--muted);
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 560px) {
      .meta {
        grid-template-columns: 1fr;
      }
    }

    .meta strong {
      color: var(--ink);
      font-weight: 700;
    }

    .progress-wrap {
      display: grid;
      gap: 6px;
    }

    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    .progress {
      height: 8px;
      background: #efe7dc;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #d64c2c, #e68f34);
      width: 0;
      transition: width 550ms ease;
    }

    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .link-chip,
    .link-disabled {
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      border: 1px solid var(--line);
    }

    .link-chip {
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .link-chip:hover {
      transform: translateY(-1px);
      border-color: #d9b588;
    }

    .link-disabled {
      color: #8e969f;
      background: #f4f0ea;
    }

    .empty {
      background: #fff;
      border: 1px dashed #d8c6b0;
      color: var(--muted);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      font-size: 14px;
    }

    @keyframes riseIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="identity">
        <div class="mark" aria-hidden="true">M</div>
        <div>
          <h1 class="title">MacFire Projects Dashboard</h1>
          <p class="subtitle">Project function, status, live outputs, and deck links in one view.</p>
        </div>
      </div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="filters" id="filters">
      <strong>Filter:</strong>
    </section>

    <main class="grid" id="project-grid"></main>
  </div>

  <script src="data/projects.js"></script>
  <script>
    const projectGrid = document.getElementById("project-grid");
    const statsEl = document.getElementById("stats");
    const filtersEl = document.getElementById("filters");
    const projects = Array.isArray(window.MACFIRE_PROJECTS) ? window.MACFIRE_PROJECTS : [];
    const filters = [
      { key: "all", label: "All" },
      { key: "active", label: "Active" },
      { key: "pilot", label: "Pilot" },
      { key: "planned", label: "Planned" }
    ];

    function formatStatus(status) {
      if (!status) return "planned";
      return String(status).toLowerCase();
    }

    function buildStats(list) {
      const active = list.filter((item) => formatStatus(item.status) === "active").length;
      const pilot = list.filter((item) => formatStatus(item.status) === "pilot").length;
      const planned = list.filter((item) => formatStatus(item.status) === "planned").length;
      const avgProgress = list.length
        ? Math.round(list.reduce((sum, item) => sum + (Number(item.progress) || 0), 0) / list.length)
        : 0;

      const blocks = [
        { label: "Projects", value: list.length },
        { label: "Active", value: active },
        { label: "Pilot", value: pilot },
        { label: "Avg Progress", value: avgProgress + "%" }
      ];

      statsEl.innerHTML = blocks
        .map(
          (block) => `
            <article class="stat">
              <p class="label">${block.label}</p>
              <p class="value">${block.value}</p>
            </article>
          `
        )
        .join("");
    }

    function linkChip(label, url) {
      if (!url || !url.trim()) {
        return `<span class="link-disabled">${label}</span>`;
      }
      return `<a class="link-chip" href="${url}" target="_blank" rel="noreferrer">${label}</a>`;
    }

    function renderProjects(filterKey) {
      const list =
        filterKey === "all"
          ? projects
          : projects.filter((item) => formatStatus(item.status) === filterKey);

      if (!list.length) {
        projectGrid.innerHTML = `<div class="empty">No projects in this filter yet.</div>`;
        return;
      }

      projectGrid.innerHTML = list
        .map((project) => {
          const status = formatStatus(project.status);
          const outputLinks = Array.isArray(project.outputLinks) ? project.outputLinks : [];

          return `
            <article class="project-card">
              <div class="row">
                <div>
                  <h2 class="project-name">${project.name || "Untitled Project"}</h2>
                  <p class="category">${project.category || "Project"}</p>
                </div>
                <span class="badge ${status}">${status}</span>
              </div>

              <p class="summary">${project.summary || ""}</p>
              <p class="function-line">${project.functionLine || ""}</p>

              <div class="meta">
                <div><strong>Owner:</strong> ${project.owner || "n/a"}</div>
                <div><strong>Last Updated:</strong> ${project.lastUpdated || "n/a"}</div>
                <div><strong>Next Milestone:</strong> ${project.nextMilestone || "n/a"}</div>
                <div><strong>Data Boundary:</strong> ${project.confidentiality || "n/a"}</div>
              </div>

              <div class="progress-wrap">
                <div class="progress-head">
                  <span>Progress</span>
                  <span>${Number(project.progress) || 0}%</span>
                </div>
                <div class="progress"><span style="width:${Number(project.progress) || 0}%"></span></div>
              </div>

              <p class="small-note">${project.notes || ""}</p>

              <div class="links">
                ${linkChip("Repository", project.repoUrl)}
                ${outputLinks
                  .map((output) => linkChip(output.label || "Output", output.url || ""))
                  .join("")}
                ${linkChip(project.deckLink?.label || "Deck", project.deckLink?.url || "")}
              </div>
            </article>
          `;
        })
        .join("");
    }

    function renderFilters(active) {
      const html = filters
        .map(
          (item) =>
            `<button data-filter="${item.key}" class="${item.key === active ? "active" : ""}">${item.label}</button>`
        )
        .join("");
      filtersEl.insertAdjacentHTML("beforeend", html);

      filtersEl.querySelectorAll("button").forEach((btn) => {
        btn.addEventListener("click", () => {
          const key = btn.getAttribute("data-filter");
          filtersEl.querySelectorAll("button").forEach((item) => item.classList.remove("active"));
          btn.classList.add("active");
          renderProjects(key);
        });
      });
    }

    buildStats(projects);
    renderFilters("all");
    renderProjects("all");
  </script>
</body>
</html>
