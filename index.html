<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacFire Projects</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #f8f2eb;
      --panel: #fffdfa;
      --panel-strong: #fff8ef;
      --ink: #1d2228;
      --muted: #5c646f;
      --line: #e6ddd0;
      --accent: #d64c2c;
      --ok: #207a41;
      --pilot: #b46c07;
      --planned: #6d7480;
      --shadow: 0 16px 36px rgba(38, 26, 15, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background:
        radial-gradient(circle at 85% -20%, #ffe4d4 0%, rgba(255, 228, 212, 0.2) 50%, rgba(255, 228, 212, 0) 70%),
        linear-gradient(180deg, #fcf8f3 0%, #f8f2eb 100%);
      font-family: "Manrope", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    .shell {
      max-width: 860px;
      margin: 0 auto;
      padding: 28px 20px 60px;
    }

    /* ── Header ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .identity { display: flex; align-items: center; gap: 14px; }

    .mark {
      width: 44px; height: 44px;
      border-radius: 10px;
      background: linear-gradient(135deg, #1f252c, #485566);
      display: grid; place-items: center;
      color: #fff; font-size: 22px;
      flex-shrink: 0;
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1.05;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 28px;
    }

    @media (max-width: 580px) {
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 16px;
      box-shadow: var(--shadow);
    }

    .stat .label {
      margin: 0 0 6px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    .stat .value {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: 28px;
      line-height: 1;
    }

    /* ── Project cards ── */
    .grid {
      display: grid;
      gap: 20px;
      grid-template-columns: 1fr;
    }

    .project-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: var(--shadow);
      display: grid;
      gap: 16px;
      animation: riseIn 520ms ease both;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .project-name {
      margin: 0;
      font-family: "Space Grotesk", sans-serif;
      font-size: clamp(19px, 2.4vw, 24px);
      line-height: 1.1;
    }

    .category {
      margin: 5px 0 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .badge {
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .badge.active  { background: #dff5e8; color: var(--ok); }
    .badge.pilot   { background: #fff0d5; color: var(--pilot); }
    .badge.planned { background: #eceff2; color: var(--planned); }

    .summary {
      margin: 0;
      font-size: 14px;
      font-weight: 700;
      line-height: 1.55;
    }

    .function-line {
      margin: -6px 0 0;
      font-size: 13px;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ── Progress ── */
    .progress-wrap { display: grid; gap: 6px; }

    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    .progress {
      height: 7px;
      background: #efe7dc;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: linear-gradient(90deg, #d64c2c, #e68f34);
      width: 0;
      transition: width 650ms ease;
    }

    /* ── Steps ── */
    .steps-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 36px;
      padding: 18px 0;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
    }

    @media (max-width: 540px) {
      .steps-grid {
        grid-template-columns: 1fr;
        gap: 18px;
      }
    }

    .steps-label {
      margin: 0 0 10px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    .steps-list {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .steps-list li {
      font-size: 13px;
      line-height: 1.45;
      padding-left: 20px;
      position: relative;
    }

    .done-list li::before {
      content: "✓";
      position: absolute;
      left: 0;
      top: 1px;
      color: var(--ok);
      font-weight: 700;
      font-size: 11px;
    }

    .next-list li::before {
      content: "→";
      position: absolute;
      left: 0;
      top: 1px;
      color: var(--accent);
      font-weight: 700;
      font-size: 11px;
    }

    /* ── Meta + links ── */
    .meta {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--muted);
    }

    .meta strong { color: var(--ink); font-weight: 700; }

    .links { display: flex; flex-wrap: wrap; gap: 8px; }

    .link-chip, .link-disabled {
      border-radius: 999px;
      padding: 7px 13px;
      font-size: 12px;
      border: 1px solid var(--line);
    }

    .link-chip {
      text-decoration: none;
      color: var(--ink);
      background: #fff;
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .link-chip:hover {
      transform: translateY(-1px);
      border-color: #d9b588;
    }

    .link-disabled { color: #8e969f; background: #f4f0ea; }

    .empty {
      background: #fff;
      border: 1px dashed #d8c6b0;
      color: var(--muted);
      border-radius: 12px;
      padding: 32px;
      text-align: center;
      font-size: 14px;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="identity">
        <div class="mark" aria-hidden="true">M</div>
        <div>
          <h1 class="title">MacFire Projects</h1>
          <p class="subtitle">Status, progress, and next steps across all active work.</p>
        </div>
      </div>
    </header>

    <section class="stats" id="stats"></section>
    <main class="grid" id="project-grid"></main>
  </div>

  <script src="data/projects.js"></script>
  <script>
    const projects = Array.isArray(window.MACFIRE_PROJECTS) ? window.MACFIRE_PROJECTS : [];

    function formatStatus(s) {
      return String(s || "planned").toLowerCase();
    }

    function linkChip(label, url) {
      if (!url || !url.trim()) return `<span class="link-disabled">${label}</span>`;
      return `<a class="link-chip" href="${url}" target="_blank" rel="noreferrer">${label}</a>`;
    }

    function buildStats() {
      const active  = projects.filter(p => formatStatus(p.status) === "active").length;
      const pilot   = projects.filter(p => formatStatus(p.status) === "pilot").length;
      const avg     = projects.length
        ? Math.round(projects.reduce((s, p) => s + (Number(p.progress) || 0), 0) / projects.length)
        : 0;
      const done    = projects.reduce((s, p) => s + (p.completedSteps?.length || 0), 0);

      const blocks = [
        { label: "Live",         value: active },
        { label: "In Pilot",     value: pilot },
        { label: "Avg Progress", value: avg + "%" },
        { label: "Steps Done",   value: done }
      ];

      document.getElementById("stats").innerHTML = blocks.map(b => `
        <article class="stat">
          <p class="label">${b.label}</p>
          <p class="value">${b.value}</p>
        </article>
      `).join("");
    }

    function renderProjects() {
      const grid = document.getElementById("project-grid");

      if (!projects.length) {
        grid.innerHTML = `<div class="empty">No projects yet.</div>`;
        return;
      }

      grid.innerHTML = projects.map((p, i) => {
        const status  = formatStatus(p.status);
        const outputs = Array.isArray(p.outputLinks)    ? p.outputLinks    : [];
        const done    = Array.isArray(p.completedSteps) ? p.completedSteps : [];
        const next    = Array.isArray(p.upcomingSteps)  ? p.upcomingSteps  : [];

        const doneHtml = done.map(s => `<li>${s}</li>`).join("");
        const nextHtml = next.map(s => `<li>${s}</li>`).join("");

        const stepsSection = (done.length || next.length) ? `
          <div class="steps-grid">
            <div>
              <p class="steps-label">Done</p>
              <ul class="steps-list done-list">${doneHtml}</ul>
            </div>
            <div>
              <p class="steps-label">Up next</p>
              <ul class="steps-list next-list">${nextHtml}</ul>
            </div>
          </div>
        ` : "";

        const outputChips = outputs.map(o => linkChip(o.label || "Output", o.url || "")).join("");
        const deckChip    = p.deckLink ? linkChip(p.deckLink.label || "Deck", p.deckLink.url || "") : "";
        const repoChip    = p.repoUrl  ? linkChip("Repository", p.repoUrl) : "";

        return `
          <article class="project-card" style="animation-delay: ${i * 90}ms">
            <div class="card-header">
              <div>
                <h2 class="project-name">${p.name || "Untitled"}</h2>
                <p class="category">${p.category || ""}</p>
              </div>
              <span class="badge ${status}">${status}</span>
            </div>

            <p class="summary">${p.summary || ""}</p>
            <p class="function-line">${p.functionLine || ""}</p>

            <div class="progress-wrap">
              <div class="progress-head">
                <span>Progress</span>
                <span>${Number(p.progress) || 0}%</span>
              </div>
              <div class="progress">
                <span data-w="${Number(p.progress) || 0}"></span>
              </div>
            </div>

            ${stepsSection}

            <div class="meta">
              <span><strong>Owner:</strong> ${p.owner || "n/a"}</span>
              <span><strong>Updated:</strong> ${p.lastUpdated || "n/a"}</span>
            </div>

            <div class="links">
              ${repoChip}
              ${outputChips}
              ${deckChip}
            </div>
          </article>
        `;
      }).join("");

      // Trigger progress bar animations after initial paint
      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll(".progress span[data-w]").forEach(el => {
          el.style.width = el.dataset.w + "%";
        });
      }));
    }

    buildStats();
    renderProjects();
  </script>
</body>
</html>
