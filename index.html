<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MacFire Projects Dashboard</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #EEF3FA;
      --panel: #FFFFFF;
      --panel-strong: #F4F5F9;
      --ink: #1A1A1A;
      --muted: #555555;
      --line: #D8D8D8;
      --navy: #1A1F3C;
      --navy-deep: #0E1530;
      --accent: #C31E1F;
      --accent-deep: #9B1718;
      --accent-soft: #FCEAEA;
      --ok: #1F6B2A;
      --pilot: #C31E1F;
      --planned: #5A5A57;
      --shadow: 0 16px 36px rgba(26, 31, 60, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Manrope", "Segoe UI", sans-serif;
      min-height: 100vh;
    }

    body.drawer-open {
      overflow: hidden;
    }

    .shell {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 20px 40px;
    }

    /* ── Header ─────────────────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }

    .identity { display: flex; align-items: center; gap: 14px; }

    .mark {
      width: 42px; height: 42px; border-radius: 10px;
      background: var(--navy);
      display: grid; place-items: center;
      color: var(--panel); font-size: 22px;
    }

    .title {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: clamp(24px, 3.3vw, 44px);
      letter-spacing: 0; line-height: 1.05;
    }

    .subtitle { margin: 4px 0 0; color: var(--muted); font-size: 14px; }

    .last-updated-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--navy);
      color: var(--panel);
      border: 1px solid var(--navy);
      border-radius: 999px;
      padding: 5px 11px;
      font-size: 12px;
      font-weight: 700;
    }

    /* ── Stats ──────────────────────────────────────────────── */
    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    @media (max-width: 920px) { .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); } }
    @media (max-width: 580px) { .stats { grid-template-columns: 1fr; } }

    .stat {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 10px 14px;
      box-shadow: var(--shadow);
      animation: fadeIn 420ms ease both;
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      min-height: 0;
    }

    .stat .label {
      margin: 0;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 11px;
      font-weight: 700;
    }

    .stat .value {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 20px;
      line-height: 1;
    }

    /* ── Filters ─────────────────────────────────────────────── */
    .filters {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }

    .filters strong { font-size: 13px; font-weight: 700; }

    .filters button {
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      border-radius: 999px;
      padding: 7px 11px;
      font-size: 13px;
      cursor: pointer;
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .filters button:hover { transform: translateY(-1px); border-color: var(--navy); }
    .filters button.active { background: var(--navy); color: var(--panel); border-color: var(--navy); }

    /* ── Grid ────────────────────────────────────────────────── */
    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }

    .project-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 16px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      align-self: stretch;
      gap: 8px;
      animation: riseIn 520ms ease both;
      cursor: pointer;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .project-card:hover,
    .project-card:focus-visible {
      border-color: var(--navy);
      box-shadow: 0 18px 42px rgba(26, 31, 60, 0.14);
      transform: translateY(-1px);
      outline: none;
    }

    .card-top {
      display: flex;
      flex-direction: column;
      gap: 12px;
      align-self: start;
      width: 100%;
    }

    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .project-name {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 24px;
      line-height: 1.05;
    }

    .category {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .badge {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .badge.active { background: var(--navy); color: var(--panel); }
    .badge.pilot  { background: var(--accent); color: var(--panel); }
    .badge.planned { background: var(--accent-soft); color: var(--planned); }
    .badge.complete { background: var(--ok); color: var(--panel); }

    .project-updated {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }

    .summary, .function-line, .small-note {
      margin: 0;
      color: var(--ink);
      font-size: 14px;
    }

    .summary { font-weight: 700; }
    .function-line { color: var(--muted); }

    .small-note {
      border-top: 1px solid var(--line);
      color: var(--muted);
      padding-top: 10px;
    }

    .meta {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    @media (max-width: 560px) { .meta { grid-template-columns: 1fr; } }
    .meta strong { color: var(--ink); font-weight: 700; }

    /* ── Progress ────────────────────────────────────────────── */
    .progress-wrap { display: grid; gap: 6px; }

    .progress-head {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
    }

    .progress {
      height: 8px;
      background: var(--line);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress > span {
      display: block;
      height: 100%;
      background: var(--accent);
      width: 0;
      transition: width 550ms ease;
    }

    /* ── Recent wins ─────────────────────────────────────────── */
    .wins-section {
      padding-top: 4px;
    }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 0 0 7px;
    }

    .wins-list { margin: 0; padding: 0; list-style: none; display: grid; gap: 5px; }

    .wins-list li {
      display: flex;
      align-items: baseline;
      gap: 7px;
      font-size: 13px;
      line-height: 1.4;
    }

    .wins-list li::before {
      content: "✓";
      color: var(--accent);
      font-weight: 700;
      font-size: 11px;
      flex-shrink: 0;
    }

    .win-date {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Next steps ──────────────────────────────────────────── */
    .steps-section {
      border-top: 1px solid var(--line);
      padding-top: 10px;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 7px;
    }

    .steps-col { display: grid; gap: 6px; }

    .steps-col-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 4px 8px;
      border-radius: 4px;
    }

    .steps-col.jonathan .steps-col-label {
      background: var(--accent-soft);
      color: var(--accent);
      border: 1px solid var(--line);
    }

    .steps-box {
      background: var(--panel-strong);
      border: 1px solid var(--line);
      border-radius: 6px;
      display: grid;
      gap: 5px;
      margin: 0;
      padding: 8px 10px;
    }

    .steps-box li {
      font-size: 12px;
      line-height: 1.45;
      color: var(--ink);
      display: flex;
      align-items: baseline;
      gap: 6px;
      list-style: none;
    }

    .steps-box li::before {
      content: "·";
      color: var(--accent);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* ── Links + feedback ────────────────────────────────────── */
    .links {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-start;
    }

    .card-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: auto;
      padding-top: 8px;
      border-top: 1px solid var(--line);
    }

    .link-chip, .link-disabled {
      border-radius: 999px;
      padding: 8px 11px;
      font-size: 12px;
      border: 1px solid var(--line);
    }

    .link-chip {
      text-decoration: none;
      color: var(--ink);
      background: var(--panel);
      transition: transform 160ms ease, border-color 160ms ease;
    }

    .link-chip:hover { transform: translateY(-1px); border-color: var(--navy); }
    .link-disabled { color: var(--muted); background: var(--bg); }

    .feedback-row {
      display: flex;
      justify-content: flex-end;
      margin-left: auto;
    }

    .feedback-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      transition: color 160ms ease;
    }

    .feedback-link:hover { color: var(--accent); }

    /* ── Project detail drawer ───────────────────────────────── */
    .drawer-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(14, 21, 48, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity 160ms ease;
      z-index: 20;
    }

    .drawer-backdrop.open {
      opacity: 1;
      pointer-events: auto;
    }

    .project-drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: min(560px, 94vw);
      background: var(--panel);
      border-left: 1px solid var(--line);
      box-shadow: -20px 0 42px rgba(26, 31, 60, 0.18);
      transform: translateX(100%);
      transition: transform 220ms cubic-bezier(0.2, 0.7, 0.2, 1);
      z-index: 21;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      overscroll-behavior: contain;
    }

    .project-drawer.open { transform: translateX(0); }

    #drawer-content {
      display: flex;
      flex-direction: column;
      height: 100%;
      min-height: 0;
    }

    .drawer-head {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .drawer-title-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 14px;
    }

    .drawer-title {
      margin: 0;
      font-family: "Space Grotesk", "Segoe UI", sans-serif;
      font-size: 26px;
      line-height: 1.05;
    }

    .drawer-close {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--panel-strong);
      color: var(--ink);
      cursor: pointer;
      font-size: 18px;
      line-height: 1;
      flex-shrink: 0;
    }

    .drawer-close:hover { border-color: var(--navy); }

    .drawer-subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .drawer-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .drawer-chip {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      color: var(--muted);
      background: var(--panel-strong);
      font-size: 12px;
      font-weight: 700;
    }

    .drawer-body {
      padding: 18px 22px 26px;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      overscroll-behavior: contain;
    }

    .drawer-count {
      margin: 0 0 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .drawer-wins {
      margin: 0;
      padding: 0;
      list-style: none;
      display: grid;
      gap: 10px;
    }

    .drawer-win {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-strong);
      padding: 11px 12px;
      display: grid;
      gap: 5px;
    }

    .drawer-win time {
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
    }

    .drawer-win span {
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 560px) {
      .card-actions {
        align-items: flex-start;
        flex-direction: column;
      }

      .feedback-row {
        justify-content: flex-start;
        margin-left: 0;
      }
    }

    /* ── Empty / animations ──────────────────────────────────── */
    .empty {
      background: var(--panel);
      border: 1px dashed var(--line);
      color: var(--muted);
      border-radius: 12px;
      padding: 28px;
      text-align: center;
      font-size: 14px;
    }

    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="topbar">
      <div class="identity">
        <div class="mark" aria-hidden="true">M</div>
        <div>
          <h1 class="title">MacFire Projects Dashboard</h1>
          <p class="subtitle">Project status, recent progress, and what's next.</p>
        </div>
      </div>
      <div id="last-updated-wrap"></div>
    </header>

    <section class="stats" id="stats"></section>

    <section class="filters" id="filters">
      <strong>Filter:</strong>
    </section>

    <main class="grid" id="project-grid"></main>
  </div>

  <div id="drawer-backdrop" class="drawer-backdrop"></div>
  <aside id="project-drawer" class="project-drawer" aria-hidden="true" aria-labelledby="drawer-title">
    <div id="drawer-content"></div>
  </aside>

  <script src="data/projects.js"></script>
  <script>
    const projectGrid = document.getElementById("project-grid");
    const statsEl     = document.getElementById("stats");
    const filtersEl   = document.getElementById("filters");
    const lastUpdWrap = document.getElementById("last-updated-wrap");
    const drawer      = document.getElementById("project-drawer");
    const drawerBg    = document.getElementById("drawer-backdrop");
    const drawerBody  = document.getElementById("drawer-content");
    let lockedScrollY = 0;

    const projects = Array.isArray(window.MACFIRE_PROJECTS) ? window.MACFIRE_PROJECTS : [];

    const filters = [
      { key: "all",     label: "All" },
      { key: "active",  label: "Active" },
      { key: "pilot",   label: "Pilot" },
      { key: "complete", label: "Complete" },
      { key: "planned", label: "Planned" }
    ];

    function formatStatus(status) {
      return String(status || "planned").toLowerCase();
    }

    function esc(str) {
      return String(str || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // ── Header: most-recent lastUpdated across all projects ──────────────────
    function renderLastUpdated() {
      if (!projects.length) return;
      const latest = projects
        .map(p => p.lastUpdated || "")
        .filter(Boolean)
        .sort()
        .reverse()[0];
      if (!latest) return;
      lastUpdWrap.innerHTML = `
        <span class="last-updated-chip">
          ● Updated ${latest}
        </span>`;
    }

    // ── Stats bar ─────────────────────────────────────────────────────────────
    function buildStats(list) {
      const active  = list.filter(p => formatStatus(p.status) === "active").length;
      const pilot   = list.filter(p => formatStatus(p.status) === "pilot").length;
      const complete = list.filter(p => formatStatus(p.status) === "complete").length;
      const avgProg = list.length
        ? Math.round(list.reduce((s, p) => s + (Number(p.progress) || 0), 0) / list.length)
        : 0;

      const blocks = [
        { label: "Projects",     value: list.length },
        { label: "Active",       value: active },
        { label: "Pilot",        value: pilot },
        { label: "Complete",     value: complete },
        { label: "Avg Progress", value: avgProg + "%" }
      ];

      statsEl.innerHTML = blocks.map(b => `
        <article class="stat">
          <p class="label">${b.label}</p>
          <p class="value">${b.value}</p>
        </article>`).join("");
    }

    // ── Link chips ────────────────────────────────────────────────────────────
    function linkChip(label, url) {
      if (!url || !url.trim()) return `<span class="link-disabled">${esc(label)}</span>`;
      return `<a class="link-chip" href="${esc(url)}" target="_blank" rel="noreferrer">${esc(label)}</a>`;
    }

    // ── Recent wins ───────────────────────────────────────────────────────────
    function renderWins(wins) {
      if (!Array.isArray(wins) || !wins.length) return "";
      const items = wins.slice(0, 5).map(w => `
        <li>
          <span class="win-date">${esc(w.date)}</span>
          ${esc(w.text)}
        </li>`).join("");
      return `
        <div class="wins-section">
          <p class="section-label">What we've done</p>
          <ul class="wins-list">${items}</ul>
        </div>`;
    }

    // ── Project detail drawer ────────────────────────────────────────────────
    function projectById(id) {
      return projects.find(p => p.id === id);
    }

    function renderDrawerWins(wins) {
      if (!Array.isArray(wins) || !wins.length) {
        return `<div class="empty">No completed items logged for this project yet.</div>`;
      }

      return `
        <p class="drawer-count">${wins.length} completed ${wins.length === 1 ? "item" : "items"}</p>
        <ul class="drawer-wins">
          ${wins.map(w => `
            <li class="drawer-win">
              <time>${esc(w.date || "No date")}</time>
              <span>${esc(w.text || "")}</span>
            </li>`).join("")}
        </ul>`;
    }

    function openProjectDrawer(id) {
      const project = projectById(id);
      if (!project) return;

      const status = formatStatus(project.status);
      const wins = Array.isArray(project.activityLog) ? project.activityLog : project.recentWins;

      drawerBody.innerHTML = `
        <div class="drawer-head">
          <div class="drawer-title-row">
            <div>
              <h2 class="drawer-title" id="drawer-title">${esc(project.name || "Untitled Project")}</h2>
              <p class="drawer-subtitle">${esc(project.summary || "")}</p>
            </div>
            <button class="drawer-close" type="button" aria-label="Close project details" onclick="closeProjectDrawer()">×</button>
          </div>
          <div class="drawer-meta">
            <span class="badge ${status}">${status}</span>
            <span class="drawer-chip">${Number(project.progress) || 0}% progress</span>
            <span class="drawer-chip">Updated ${esc(project.lastUpdated || "n/a")}</span>
          </div>
        </div>
        <div class="drawer-body">
          ${renderDrawerWins(wins)}
        </div>`;

      drawer.classList.add("open");
      drawerBg.classList.add("open");
      lockPageScroll();
      drawer.setAttribute("aria-hidden", "false");
    }

    function closeProjectDrawer() {
      drawer.classList.remove("open");
      drawerBg.classList.remove("open");
      unlockPageScroll();
      drawer.setAttribute("aria-hidden", "true");
    }

    function lockPageScroll() {
      lockedScrollY = window.scrollY || 0;
      document.body.classList.add("drawer-open");
      document.body.style.position = "fixed";
      document.body.style.top = `-${lockedScrollY}px`;
      document.body.style.left = "0";
      document.body.style.right = "0";
      document.body.style.width = "100%";
    }

    function unlockPageScroll() {
      document.body.classList.remove("drawer-open");
      document.body.style.position = "";
      document.body.style.top = "";
      document.body.style.left = "";
      document.body.style.right = "";
      document.body.style.width = "";
      window.scrollTo(0, lockedScrollY);
    }

    // ── Next steps ────────────────────────────────────────────────────────────
    function renderNextSteps(steps) {
      if (!Array.isArray(steps) || !steps.length) return "";
      const jonathan = steps.filter(s => s.owner === "jonathan");
      if (!jonathan.length) return "";

      const jonathanCol = jonathan.length ? `
        <div class="steps-col jonathan">
          <ul class="steps-box">
            ${jonathan.map(s => `<li>${esc(s.text)}</li>`).join("")}
          </ul>
        </div>` : "";

      return `
        <div class="steps-section">
          <p class="section-label">What's next</p>
          <div class="steps-grid">
            ${jonathanCol}
          </div>
        </div>`;
    }

    // ── Feedback link ─────────────────────────────────────────────────────────
    function renderFeedback(projectName, feedbackEmail) {
      const email = "j@mccrimmond.org.uk";
      const subj  = encodeURIComponent(`Feedback: ${projectName}`);
      const body  = encodeURIComponent(`Hi Jonathan,\n\nMy feedback on ${projectName}:\n\n`);
      const href  = `mailto:${esc(email)}?subject=${subj}&body=${body}`;
      return `
        <div class="feedback-row">
          <a class="feedback-link" href="${href}">Leave feedback on this project →</a>
        </div>`;
    }

    // ── Project card ──────────────────────────────────────────────────────────
    function renderProjects(filterKey) {
      const list = filterKey === "all"
        ? projects
        : projects.filter(p => formatStatus(p.status) === filterKey);

      if (!list.length) {
        projectGrid.innerHTML = `<div class="empty">No projects in this filter yet.</div>`;
        return;
      }

      projectGrid.innerHTML = list.map(project => {
        const status      = formatStatus(project.status);
        const outputLinks = Array.isArray(project.outputLinks) ? project.outputLinks : [];

        return `
          <article class="project-card" tabindex="0" role="button" aria-label="Open ${esc(project.name || "project")} activity history" data-project-id="${esc(project.id || "")}">
            <div class="card-top">
              <div class="row">
                <div>
                  <h2 class="project-name">${esc(project.name || "Untitled Project")}</h2>
                  <p class="category">${esc(project.category || "Project")}</p>
                </div>
                <div class="card-status">
                  <span class="project-updated">Updated ${esc(project.lastUpdated || "n/a")}</span>
                  <span class="badge ${status}">${status}</span>
                </div>
              </div>

              <p class="summary">${esc(project.summary || "")}</p>
              ${project.functionLine ? `<p class="function-line">${esc(project.functionLine)}</p>` : ""}

              <div class="meta">
                <div><strong>Next Milestone:</strong> ${esc(project.nextMilestone || "n/a")}</div>
              </div>

              ${project.notes ? `<p class="small-note">${esc(project.notes)}</p>` : ""}

              <div class="progress-wrap">
                <div class="progress-head">
                  <span>Progress</span>
                  <span>${Number(project.progress) || 0}%</span>
                </div>
                <div class="progress"><span style="width:${Number(project.progress) || 0}%"></span></div>
              </div>
            </div>

            ${renderWins(project.recentWins)}

            ${renderNextSteps(project.nextSteps)}

            <div class="card-actions">
              <div class="links">
                ${linkChip(project.deckLink?.label || "Deck", project.deckLink?.url || "")}
                ${outputLinks.map(o => linkChip(o.label || "Output", o.url || "")).join("")}
              </div>

              ${renderFeedback(project.name, project.feedbackEmail)}
            </div>
          </article>`;
      }).join("");

      projectGrid.querySelectorAll(".project-card").forEach(card => {
        card.addEventListener("click", event => {
          if (event.target.closest("a, button")) return;
          openProjectDrawer(card.getAttribute("data-project-id"));
        });
        card.addEventListener("keydown", event => {
          if (event.key !== "Enter" && event.key !== " ") return;
          event.preventDefault();
          openProjectDrawer(card.getAttribute("data-project-id"));
        });
      });
    }

    // ── Filters ───────────────────────────────────────────────────────────────
    function renderFilters(active) {
      const html = filters.map(item =>
        `<button data-filter="${item.key}" class="${item.key === active ? "active" : ""}">${item.label}</button>`
      ).join("");
      filtersEl.insertAdjacentHTML("beforeend", html);

      filtersEl.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
          const key = btn.getAttribute("data-filter");
          filtersEl.querySelectorAll("button").forEach(b => b.classList.remove("active"));
          btn.classList.add("active");
          renderProjects(key);
        });
      });
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    renderLastUpdated();
    buildStats(projects);
    renderFilters("all");
    renderProjects("all");
    drawerBg.addEventListener("click", closeProjectDrawer);
    document.addEventListener("keydown", event => {
      if (event.key === "Escape") closeProjectDrawer();
    });
  </script>
</body>
</html>
